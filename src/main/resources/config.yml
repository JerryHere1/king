# ============================================================
#   SuperBot Configuration
# ============================================================

# Maximum number of bots a single player can own
max-bots-per-player: 1

# Permission required to spawn a bot (set to "" to allow everyone)
spawn-permission: "superbot.spawn"

# Bot display name (supports color codes with &)
bot-name: "&6SuperBot"

# ============================================================
#   AI Tick Settings
# ============================================================
ai:
  # How often the AI brain ticks in ticks (20 ticks = 1 second)
  tick-interval: 40

  # How often the survival (combat) scanner runs in ticks
  combat-tick-interval: 10

  # Radius (blocks) to scan for hostile mobs
  combat-scan-radius: 6

  # Radius (blocks) to scan for ores (Mining Mode)
  mining-scan-radius: 5

  # Radius (blocks) to scan for logs (Lumberjack Mode)
  lumber-scan-radius: 5

  # Radius (blocks) to scan for crops (Farming Mode)
  farming-scan-radius: 4

  # Damage the bot deals per hit to mobs
  combat-damage: 4.0

  # Walking speed boost applied when roaming (0.2 = normal player)
  roam-speed: 0.25

# ============================================================
#   Mining Mode - Supported Ores
# ============================================================
mining:
  ores:
    COAL_ORE:
      drop: COAL
      amount: 1
    DEEPSLATE_COAL_ORE:
      drop: COAL
      amount: 1
    IRON_ORE:
      drop: RAW_IRON
      amount: 1
    DEEPSLATE_IRON_ORE:
      drop: RAW_IRON
      amount: 1
    GOLD_ORE:
      drop: RAW_GOLD
      amount: 1
    DEEPSLATE_GOLD_ORE:
      drop: RAW_GOLD
      amount: 1
    DIAMOND_ORE:
      drop: DIAMOND
      amount: 1
    DEEPSLATE_DIAMOND_ORE:
      drop: DIAMOND
      amount: 1
    EMERALD_ORE:
      drop: EMERALD
      amount: 1
    DEEPSLATE_EMERALD_ORE:
      drop: EMERALD
      amount: 1
    LAPIS_ORE:
      drop: LAPIS_LAZULI
      amount: 4
    DEEPSLATE_LAPIS_ORE:
      drop: LAPIS_LAZULI
      amount: 4
    REDSTONE_ORE:
      drop: REDSTONE
      amount: 4
    DEEPSLATE_REDSTONE_ORE:
      drop: REDSTONE
      amount: 4
    COPPER_ORE:
      drop: RAW_COPPER
      amount: 2
    DEEPSLATE_COPPER_ORE:
      drop: RAW_COPPER
      amount: 2
    ANCIENT_DEBRIS:
      drop: ANCIENT_DEBRIS
      amount: 1
    NETHER_QUARTZ_ORE:
      drop: QUARTZ
      amount: 1
    NETHER_GOLD_ORE:
      drop: RAW_GOLD
      amount: 1

# ============================================================
#   Lumberjack Mode - Supported Logs
# ============================================================
lumber:
  logs:
    - OAK_LOG
    - SPRUCE_LOG
    - BIRCH_LOG
    - JUNGLE_LOG
    - ACACIA_LOG
    - DARK_OAK_LOG
    - MANGROVE_LOG
    - CHERRY_LOG
    - BAMBOO_BLOCK
    - CRIMSON_STEM
    - WARPED_STEM

# ============================================================
#   Farming Mode - Supported Crops
# ============================================================
farming:
  crops:
    WHEAT:
      mature-age: 7
      drop: WHEAT
      drop-amount: 1
      seed: WHEAT_SEEDS
      seed-amount: 1
    POTATOES:
      mature-age: 7
      drop: POTATO
      drop-amount: 2
      seed: POTATO
      seed-amount: 1
    CARROTS:
      mature-age: 7
      drop: CARROT
      drop-amount: 2
      seed: CARROT
      seed-amount: 1
    BEETROOTS:
      mature-age: 3
      drop: BEETROOT
      drop-amount: 1
      seed: BEETROOT_SEEDS
      seed-amount: 1

# ============================================================
#   Hologram Settings
# ============================================================
holograms:
  enabled: true
  # Height above the NPC's head
  height-offset: 2.3
  # Update interval in ticks
  update-interval: 20

# ============================================================
#   Messages (supports & color codes)
# ============================================================
messages:
  prefix: "&8[&6SuperBot&8] "
  spawned: "&aYour SuperBot has been spawned!"
  removed: "&cYour SuperBot has been removed."
  no-permission: "&cYou don't have permission to do that."
  max-bots: "&cYou have reached your bot limit ({max} bots)."
  backpack-full: "&cYour SuperBot's backpack is full! Come collect your items."
  bot-not-found: "&cYou don't have an active SuperBot."
  summoned: "&aYour SuperBot has been summoned to you."
  reloaded: "&aConfiguration reloaded."
